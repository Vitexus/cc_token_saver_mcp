<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1e3a5f"/>

  <!-- Token coin (top) — represents Claude Code tokens being saved -->
  <circle cx="32" cy="15" r="10" fill="#f59e0b"/>
  <circle cx="32" cy="15" r="7.5" fill="none" stroke="#fde68a" stroke-width="1.5" opacity="0.7"/>
  <text x="32" y="19.5" text-anchor="middle"
        font-family="DejaVu Sans,sans-serif" font-weight="bold" font-size="9"
        fill="#78350f">T</text>

  <!-- Down-arrow — delegation to local LLM -->
  <line x1="32" y1="27" x2="32" y2="36" stroke="#10b981" stroke-width="2.5"
        stroke-linecap="round"/>
  <polygon points="27,35 32,42 37,35" fill="#10b981"/>

  <!-- CPU chip (bottom) — represents local LLM -->
  <rect x="19" y="43" width="26" height="16" rx="3" fill="none"
        stroke="#22d3ee" stroke-width="2"/>
  <rect x="23" y="47" width="18" height="8" rx="1.5" fill="#22d3ee" opacity="0.25"/>

  <!-- Chip internal grid lines -->
  <line x1="29" y1="47" x2="29" y2="55" stroke="#22d3ee" stroke-width="0.8" opacity="0.8"/>
  <line x1="35" y1="47" x2="35" y2="55" stroke="#22d3ee" stroke-width="0.8" opacity="0.8"/>
  <line x1="23" y1="51" x2="41" y2="51" stroke="#22d3ee" stroke-width="0.8" opacity="0.8"/>

  <!-- Chip pins — left -->
  <line x1="15" y1="47" x2="19" y2="47" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="51" x2="19" y2="51" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="55" x2="19" y2="55" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Chip pins — right -->
  <line x1="45" y1="47" x2="49" y2="47" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="45" y1="51" x2="49" y2="51" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="45" y1="55" x2="49" y2="55" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
</svg>
